
<!DOCTYPE html>
<html>
<head>
<title>Test Network</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.23.0/cytoscape.min.js"></script>
</head>
<body>
<div id="cy" style="width: 100%; height: 100vh; background: lightblue;"></div>
<script>
var cy = cytoscape({
  container: document.getElementById('cy'),
  elements: [
    { data: { id: 'a' } },
    { data: { id: 'b' } },
    { data: { id: 'ab', source: 'a', target: 'b' } }
  ],
  style: [
    { selector: 'node', style: { 'background-color': '#555', 'width': 50, 'height': 50 } },
    { selector: 'edge', style: { 'line-color': '#555', 'width': 2 } }
  ],
  layout: { name: 'grid' }
});
console.log('Test network created with ' + cy.nodes().length + ' nodes');
</script>
</body>
</html>
